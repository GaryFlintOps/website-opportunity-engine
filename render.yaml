services:
  - type: web
    name: website-opportunity-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.dashboard:app --host 0.0.0.0 --port 10000
    envVars:
      - key: APIFY_API_TOKEN
        sync: false
      - key: SITE_URL
        sync: false
